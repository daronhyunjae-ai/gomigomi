<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title></title>
  <style>
    :root{
      --shadow: 0 18px 60px rgba(0,0,0,.16);
      --stroke: rgba(0,0,0,.08);
      --panel: rgba(255,255,255,.78);

      --trashBinGap: 140px;

      --burn: #ff4d6d;
      --nonburn: #5b6cff;
      --plastic: #22d3a7;
    }

    *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
    html,body{height:100%;}
    body{
      margin:0;
      overflow:hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background:
        url("haikei.png") center/cover no-repeat,
        radial-gradient(1200px 700px at 12% 20%, rgba(255,90,160,.22), transparent 60%),
        radial-gradient(1200px 700px at 88% 26%, rgba(70,220,255,.22), transparent 60%),
        radial-gradient(1200px 700px at 60% 90%, rgba(34,211,167,.20), transparent 60%),
        linear-gradient(180deg, #fff8fd, #f4fbff);
    }

    .wrap{height:100%; padding:14px; display:flex; flex-direction:column; gap:12px;}
    .topbar{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      gap:12px;
      padding: 10px 12px;
      border-radius: 26px;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .topbar .scorePill{grid-column: 2; justify-self: center;}
    .topbar #resetBtn{grid-column: 3; justify-self: end;}

    .scorePill{
      position:relative;
      display:flex;
      align-items:center;
      gap:10px;
      padding:16px 20px;
      border-radius:22px;
      background: linear-gradient(135deg, rgba(255,231,122,.72), rgba(255,122,209,.56), rgba(122,252,255,.50));
      border: 2px solid rgba(255,255,255,.75);
      box-shadow: 0 16px 40px rgba(0,0,0,.14);
      user-select:none;
      overflow:hidden;
    }

    .scorePill::before{
      content:"";
      position:absolute;
      left:8px;
      right:8px;
      top:6px;
      height: 50%;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.70), rgba(255,255,255,0));
      pointer-events:none;
      mix-blend-mode: screen;
      opacity:.9;
    }

    .scorePill::after{
      content:"✨";
      position:absolute;
      right:10px;
      top:6px;
      font-size:22px;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.12));
      opacity:.92;
      animation: scoreSparkle 1.7s ease-in-out infinite;
      pointer-events:none;
    }

    .scoreIcon{
      width:74px;
      height:74px;
      border-radius:22px;
      display:grid;
      place-items:center;
      font-size:40px;
      font-weight:1000;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.85), rgba(255,255,255,0) 42%), linear-gradient(135deg, #ffb7e1, #ffe77a, #a7f3ff);
      box-shadow: 0 18px 34px rgba(0,0,0,.14);
      border: 2px solid rgba(255,255,255,.78);
    }
    .scoreNum{font-size:56px; font-weight:1000; letter-spacing:.6px; line-height:1; color: rgba(0,0,0,.80); text-shadow: 0 3px 0 rgba(255,255,255,.75), 0 14px 24px rgba(0,0,0,.12);}

    @keyframes scoreSparkle{
      0%,100%{transform: translateY(0) rotate(-6deg) scale(1); opacity:.92;}
      50%{transform: translateY(-2px) rotate(6deg) scale(1.08); opacity:1;}
    }

    .btn{
      border:none;
      border-radius:18px;
      padding:10px 14px;
      background: var(--panel);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      font-weight:1000;
      font-size:22px;
      line-height:1;
      cursor:pointer;
      user-select:none;
      touch-action: manipulation;
    }
    .btn:active{transform: translateY(1px);}

    .stage{flex:1; min-height:0; display:grid; grid-template-rows: 1fr;}

    .playArea{
      position:relative;
      border-radius:28px;
      background: rgba(255,255,255,.56);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      overflow:hidden;
      padding: 16px;
      padding-bottom: calc(310px + var(--trashBinGap));
    }

    .sparkles{
      position:absolute;
      inset:-40px;
      opacity:.85;
      pointer-events:none;
      background:
        radial-gradient(circle at 10% 15%, rgba(255,122,209,.25) 0 9px, transparent 10px),
        radial-gradient(circle at 18% 75%, rgba(255,231,122,.25) 0 10px, transparent 11px),
        radial-gradient(circle at 70% 20%, rgba(34,211,167,.22) 0 9px, transparent 10px),
        radial-gradient(circle at 86% 78%, rgba(91,108,255,.22) 0 11px, transparent 12px);
    }

    .item{
      position:absolute;
      left:50%;
      top: calc(48% - 1.5cm);
      transform: translate(-50%, -50%);
      width: min(380px, 72vw);
      height: min(330px, 64vw);
      border-radius:30px;
      background: rgba(255,255,255,.92);
      border: 1px solid var(--stroke);
      box-shadow: 0 26px 60px rgba(0,0,0,.18);
      display:grid;
      place-items:center;
      user-select:none;
      touch-action:none;
      cursor:grab;
      z-index: 3;
    }
    .item:active{cursor:grabbing;}
    .itemIcon{display:none;}

    .itemImg{
      width: min(300px, 64vw);
      height: auto;
      mix-blend-mode: multiply;
      filter: drop-shadow(0 18px 26px rgba(0,0,0,.18)) contrast(1.06) saturate(1.06);
      user-select:none;
      pointer-events:none;
    }

    .item.spraySmall .itemImg{
      transform: translate(-2cm, -1cm) scale(0.80);
      transform-origin: center;
    }

    .item.boxUp .itemImg{
      transform: translateY(-1cm);
    }

    .item.vinylBagUp .itemImg{
      transform: translateY(-1cm);
    }

    .item.batteryUp .itemImg{
      transform: translateY(-1cm);
    }

    .item.applianceUp .itemImg{
      transform: translateY(-1cm);
    }

    .item.okashiUp .itemImg{
      transform: translateY(-1cm);
    }

    .item.eggUp .itemImg{
      transform: translateY(-1cm);
    }

    .item.appleUp .itemImg{
      transform: translateY(-1cm);
    }

    .item.trayUp .itemImg{
      transform: translateY(-1cm);
    }

    .item.tissueUp .itemImg{
      transform: translateY(-1cm);
    }

    .item.cupUpHalf .itemImg{
      transform: translateY(-0.5cm);
    }

    .item.okashiNoBg .itemImg{filter: drop-shadow(0 18px 26px rgba(0,0,0,.18)) contrast(1.06) saturate(1.06);}

    .bins{
      position:absolute;
      left:14px;
      right:14px;
      bottom:-0.6cm;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      pointer-events:auto;
      z-index: 2;
    }

    .bin{
      position:relative;
      height: 290px;
      border-radius: 28px;
      border: 1px solid rgba(0,0,0,.08);
      box-shadow: 0 18px 44px rgba(0,0,0,.16);
      overflow:hidden;
      user-select:none;
      --binShiftX: 0px;
      --binShiftY: 0px;
      transform: translate(var(--binShiftX), var(--binShiftY));
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .bin::before{
      content:"";
      position:absolute;
      left:14px;
      right:14px;
      top:14px;
      height: 24px;
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      box-shadow: inset 0 3px 0 rgba(255,255,255,.42), 0 10px 18px rgba(0,0,0,.16);
      opacity:.42;
      pointer-events:none;
    }

    .bin::after{
      content:"";
      position:absolute;
      left: 18px;
      right: 18px;
      bottom: 16px;
      height: 54px;
      border-radius: 22px;
      background: rgba(255,255,255,.32);
      border: 1px solid rgba(0,0,0,.07);
      box-shadow: inset 0 12px 24px rgba(0,0,0,.12);
      opacity:.85;
      pointer-events:none;
    }

    .binInner{height:100%; display:grid; place-items:center; position:relative; z-index:1;}
    .binIcon{font-size: 72px; line-height:1; filter: drop-shadow(0 14px 24px rgba(0,0,0,.14));}
    .binTitle{display:none;}

    .bin.hasImg .binIcon{opacity:0;}

    .binImg{
      position:absolute;
      left:50%;
      top:54%;
      transform: translate(-50%, -50%);
      width: auto;
      max-width: min(520px, 62vw);
      max-height: 99%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 18px 26px rgba(0,0,0,.18));
      user-select:none;
      pointer-events:none;
      z-index:2;
    }

    #binPlastic .binImg,
    #binBurn .binImg,
    #binPlastic,
    #binBurn,
    #binNonBurn{overflow: visible;}

    #binBurn{--binShiftX: 1cm; --binShiftY: -0.1cm;}
    #binNonBurn{--binShiftY: -0.1cm;}
    #binPlastic{--binShiftX: -1cm;}

    #binPlastic .binImg,
    #binBurn .binImg,
    #binNonBurn .binImg{
      transform: translate(-50%, -50%) scale(1.44);
    }

    .binMark{
      position:absolute;
      right:12px;
      top:12px;
      width:58px;
      height:58px;
      border-radius:18px;
      display:grid;
      place-items:center;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(0,0,0,.08);
      font-weight:1000;
      font-size:24px;
      z-index:2;
    }

    .binMark{display:none;}

    .bin.burn{background: linear-gradient(135deg, rgba(255,77,109,.95), rgba(255,197,140,.90));}
    .bin.nonburn{background: linear-gradient(135deg, rgba(91,108,255,.95), rgba(170,226,255,.88));}
    .bin.plastic{background: linear-gradient(135deg, rgba(34,211,167,.95), rgba(168,255,210,.88));}

    .bin.highlight{
      transform: translate(var(--binShiftX), calc(var(--binShiftY) - 4px)) scale(1.01);
      box-shadow: 0 26px 70px rgba(0,0,0,.20);
      outline: 6px solid rgba(255,255,255,.75);
      outline-offset: -6px;
    }

    .feedback{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      pointer-events:none;
      opacity:0;
      transform: scale(.98);
      transition: opacity .16s ease, transform .16s ease;
      z-index: 4;
    }
    .feedback.show{opacity:1; transform: scale(1);}

    .feedback.winMode .card{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }

    .feedback.perfectWin{
      background: radial-gradient(900px 520px at 50% 45%, rgba(255,255,255,.82), rgba(255,255,255,.30) 55%, rgba(255,255,255,0) 75%);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .feedback.perfectWin .card{
      width: min(980px, calc(100% - 24px));
      background: rgba(255,255,255,.92);
      border: 2px solid rgba(255,255,255,.92);
      box-shadow: 0 30px 90px rgba(0,0,0,.18);
    }

    .feedback.perfectWin .bigIcon{
      width: 140px;
      height: 140px;
      border-radius: 44px;
      animation: perfectPop 900ms cubic-bezier(.2,.9,.2,1) both;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.88), rgba(255,255,255,0) 42%), linear-gradient(135deg, rgba(255,183,225,.98), rgba(255,231,122,.95), rgba(167,243,255,.92));
      border: 2px solid rgba(255,255,255,.9);
    }

    .feedback.perfectWin .bigIcon::after{
      content:"✨";
      position:absolute;
      right:-10px;
      top:-10px;
      font-size:34px;
      filter: drop-shadow(0 12px 18px rgba(0,0,0,.14));
      animation: scoreSparkle 1.4s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes perfectPop{
      0%{transform: scale(.84) rotate(-6deg); opacity:.0;}
      55%{transform: scale(1.06) rotate(2deg); opacity:1;}
      100%{transform: scale(1) rotate(0deg); opacity:1;}
    }

    .startOverlay{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      z-index: 10;
      background: rgba(255,255,255,.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .startOverlay.hidden{display:none;}

    .startCard{
      width: min(560px, calc(100% - 36px));
      border-radius: 32px;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(0,0,0,.08);
      box-shadow: 0 26px 80px rgba(0,0,0,.20);
      padding: 18px;
      display:grid;
      gap: 14px;
      justify-items:center;
      text-align:center;
    }

    .playBtn{
      width: min(240px, 58vw);
      height: min(240px, 58vw);
      border-radius: 38px;
      border: 1px solid rgba(0,0,0,.08);
      background: linear-gradient(135deg, rgba(34,211,167,.95), rgba(255,231,122,.92));
      box-shadow: 0 26px 70px rgba(0,0,0,.18);
      display:grid;
      place-items:center;
      cursor:pointer;
      user-select:none;
      touch-action: manipulation;
    }
    .playBtn:active{transform: translateY(1px);}

    .playIcon{font-size: min(140px, 30vw); line-height:1; filter: drop-shadow(0 18px 26px rgba(0,0,0,.16));}

    .startStageNum{
      font-weight: 1000;
      font-size: min(140px, 28vw);
      line-height: 1;
      letter-spacing: 2px;
      color: rgba(0,0,0,.86);
      text-shadow: 0 3px 0 rgba(255,255,255,.8), 0 18px 34px rgba(0,0,0,.14);
    }

    .startTitle{font-weight:1000; font-size: 26px; letter-spacing:.6px;}
    .startHint{opacity:.8; font-weight:800;}

    .card{
      width: min(520px, calc(100% - 36px));
      border-radius: 32px;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(0,0,0,.08);
      box-shadow: 0 26px 80px rgba(0,0,0,.20);
      padding: 18px;
      display:grid;
      gap: 14px;
      justify-items:center;
    }

    .feedback.recycleMode .card{
      width: min(980px, calc(100% - 24px));
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
      gap: 0;
    }

    .feedback.recycleMode .bigIcon{display:none;}

    .bigIcon{width: 120px; height: 120px; border-radius: 38px; display:grid; place-items:center; font-size: 64px; font-weight:1000; box-shadow: 0 20px 54px rgba(0,0,0,.16);}
    .bigIcon.ok{background: linear-gradient(135deg, #22d3a7, #ffe77a);} 
    .bigIcon.ng{background: linear-gradient(135deg, #ff4d6d, #aadcff);} 
    .fbItem{font-size: 92px; line-height:1; filter: drop-shadow(0 16px 26px rgba(0,0,0,.14));}

    .fbItem.finalScore{
      font-size: min(140px, 26vw);
      letter-spacing: 2px;
      font-weight: 1000;
      white-space: nowrap;
      width: min(980px, 96vw);
      text-align: center;
      display:flex;
      justify-content:center;
    }

    .fbItem.finalScore.stagePerfectScore{
      flex-direction: column;
      align-items: center;
      gap: 10px;
      white-space: normal;
    }

    .fbItem.finalScore.stagePerfectScore .trophyInScore{
      font-size: min(68px, 14vw);
      line-height: 1;
      filter: drop-shadow(0 16px 22px rgba(0,0,0,.12));
    }

    .fbItem.finalScore.stagePerfectScore .scoreMain{
      display:flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 14px 22px;
    }

    .fbItem.finalScore.stagePerfectScore .perfectStar{
      font-size: min(72px, 14vw);
      line-height: 1;
      filter: drop-shadow(0 18px 26px rgba(0,0,0,.12));
    }

    .fbItem.finalScore .scoreMain{
      display:inline-block;
      padding: 10px 18px;
      border-radius: 24px;
      background: rgba(255,255,255,.92);
      border: 2px solid rgba(0,0,0,.08);
      box-shadow: 0 18px 38px rgba(0,0,0,.12);
      color: rgba(0,0,0,.82);
      text-shadow: 0 3px 0 rgba(255,255,255,.75);
      line-height: 1;
    }

    .fbItem.finalScore.perfect{
      position: relative;
      display:flex;
      justify-content:center;
      align-items:center;
      gap: 18px;
      letter-spacing: 1px;
      text-align:center;
      padding-left: 0;
      padding-right: 0;
    }

    .fbItem.finalScore.perfect .scoreMain{
      display:inline-block;
      padding: 10px 18px;
      border-radius: 24px;
      background: rgba(255,255,255,.92);
      border: 2px solid rgba(0,0,0,.08);
      box-shadow: 0 18px 38px rgba(0,0,0,.12);
      color: rgba(0,0,0,.82);
      text-shadow: 0 3px 0 rgba(255,255,255,.75);
      line-height: 1;
    }

    .fbItem.finalScore.perfect .scoreEmojis{
      position:static;
      right: auto;
      top: auto;
      transform: none;
      display:inline-block;
      font-size: .62em;
      letter-spacing: 6px;
      filter: drop-shadow(0 14px 22px rgba(0,0,0,.12));
    }

    .fbItem.finalScore.perfect .scoreEmojis.left{
      left: auto;
      right: auto;
    }

    .recycleImg{
      width: min(260px, 56vw);
      height: auto;
      mix-blend-mode: multiply;
      filter: drop-shadow(0 16px 22px rgba(0,0,0,.16)) contrast(1.06) saturate(1.06);
      user-select:none;
      pointer-events:none;
      display:none;
    }

    .recycleBadge{
      position: relative;
      width: min(720px, 96vw);
      border-radius: 28px;
      padding: 28px 20px 18px;
      background: linear-gradient(135deg, rgba(255,231,122,.52), rgba(255,122,209,.36), rgba(167,243,255,.42));
      border: 2px solid rgba(255,255,255,.78);
      box-shadow: 0 30px 90px rgba(0,0,0,.18);
      backdrop-filter: blur(10px);
      display:none;
      place-items:center;
      overflow:hidden;
    }
    .feedback.recycleMode .recycleBadge{margin-top: -80px;}

    .recycleSide{
      display:grid;
      gap: 10px;
      justify-items:center;
    }

    .feedback.recycleMode .recycleSide.beforeSide{
      transform: translateX(-0.3cm);
    }

    .feedback.recycleMode .recycleSide.afterSide{
      transform: translateX(-0.9cm);
    }

    .feedback.recycleMode .recycleArrow{
      transform: translateX(-0.2cm);
    }

    @media (max-width: 520px){
      .feedback.recycleMode .recycleBadge{margin-top: -60px;}

      .recycleFlow{
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 64px 10px 0;
      }

      .recycleArrow{padding: 0;}
      .recycleArrow .arrowMain{font-size: 64px;}

      .recyclePic{width: min(340px, 88vw); height: min(240px, 64vw);}

      .feedback.recycleMode .recycleSide.beforeSide{transform: translateX(-0.3cm);}
      .feedback.recycleMode .recycleSide.afterSide{transform: translateX(-0.9cm);}

      .feedback.recycleMode .recycleArrow{transform: translateX(-0.2cm);}
    }

    .recycleBadge::before{
      content:"";
      position:absolute;
      inset: -60px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,231,122,.55), transparent 55%),
        radial-gradient(circle at 80% 30%, rgba(34,211,167,.40), transparent 58%),
        radial-gradient(circle at 60% 86%, rgba(91,108,255,.30), transparent 60%);
      opacity: .85;
      pointer-events:none;
    }

    .recycleBadge .recycleImg{display:block; position:relative; z-index:1;}

    .recycleFlow{
      position:relative;
      z-index:1;
      width: 100%;
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      gap: 18px;
      padding: 54px 10px 0;
    }

    .recycleSide{
      display:grid;
      gap: 10px;
      justify-items:center;
    }

    .feedback.recycleMode .recycleSide.beforeSide{transform: translateX(-0.3cm);}
    .feedback.recycleMode .recycleSide.afterSide{transform: translateX(-0.9cm);}

    .recyclePic{
      width: min(290px, 40vw);
      height: min(240px, 34vw);
      border-radius: 22px;
      background: rgba(255,255,255,.86);
      border: 2px solid rgba(255,255,255,.78);
      box-shadow: inset 0 10px 20px rgba(0,0,0,.08), 0 18px 44px rgba(0,0,0,.12);
      display:grid;
      place-items:center;
      overflow:hidden;
    }

    .recyclePic::after{
      content:"";
      position:absolute;
      inset: 10px;
      border-radius: 18px;
      border: 1px dashed rgba(255,255,255,.70);
      opacity: .55;
      pointer-events:none;
    }

    .recyclePic img{
      width: 92%;
      height: 92%;
      object-fit: contain;
      filter: drop-shadow(0 14px 20px rgba(0,0,0,.16)) contrast(1.05) saturate(1.05);
    }

    .recyclePic .recycleImg{
      width: 88%;
      height: 88%;
      object-fit: contain;
      transform: translateY(-1.4cm);
    }

    .recyclePic #recycleImg{
      width: 84%;
      height: 84%;
    }

    .recycleBadge.afterEkobakku #recycleImg{
      transform: translateY(-1.4cm);
      width: 82%;
      height: 82%;
    }

    .recycleBadge.afterSyatu #recycleImg{
      transform: translateY(-1.4cm);
      width: 82%;
      height: 82%;
    }

    .recycleBadge.beforeVinylBag #recycleBeforeImg{
      transform: translateY(-1.4cm);
      width: 88%;
      height: 88%;
    }

    .recycleBadge.beforeEgg #recycleBeforeImg{
      transform: translateY(-1.4cm);
      width: 88%;
      height: 88%;
    }

    .recycleBadge.beforeSpray #recycleBeforeImg{
      transform: translateY(-1.4cm);
      width: 82%;
      height: 82%;
    }

    .recyclePic .recycleImg.big{
      width: 92%;
      height: 92%;
      max-width: 92%;
      max-height: 92%;
    }

    .recycleArrow{
      display:grid;
      place-items:center;
      gap: 8px;
      padding: 10px 10px;
    }

    .recycleArrow .arrowMain{
      font-size: 74px;
      font-weight: 1000;
      line-height: 1;

    @keyframes arrowPop{

    .recycleArrow .sparkle{

    .recycleText{

    .recycleMark,

    .recycleMark.m2{animation-delay: 60ms;}
    .recycleMark.m3{animation-delay: 180ms;}
    .recycleMark.m4{animation-delay: 120ms;}
    .recycleMark.m5{animation-delay: 240ms;}

    @keyframes recycleFloat{
      0%,100%{transform: translateY(0) rotate(-6deg) scale(1);}
      50%{transform: translateY(-4px) rotate(10deg) scale(1.04);}

    .recycleMark{left: 12px; top: 12px;}

  <script>
  (() => {
    const ITEMS = [
      // burn
      { id: 'okashi-box', img: ['ochiba.png'], kind: 'burn' },
      { id: 'tissue', img: ['tissue.png'], kind: 'burn' },
      { id: 'banana', img: ['bnamama.png', 'banana.png'], kind: 'burn' },
      { id: 'box', img: ['hako.png'], kind: 'burn' },
      { id: 'shoes', img: ['kutuu.png'], kind: 'burn' },
      { id: 'apple', img: ['ringo.png'], kind: 'burn' },
      { id: 'soccer', img: ['sakka(2).png'], kind: 'burn' },

      // nonburn
      { id: 'broken-plate', img: ['osara.png'], kind: 'nonburn' },
      { id: 'spoon', img: ['spoon.png'], kind: 'nonburn' },
      { id: 'glass', img: ['cup.png'], kind: 'nonburn' },
      { id: 'battery', img: ['kande.png'], kind: 'nonburn' },
      { id: 'appliance', img: ['dennki.png'], kind: 'nonburn' },
      { id: 'scissors', img: ['hsami.png'], kind: 'nonburn' },

      // plastic
      { id: 'vinyl-bag', img: ['rezibukuro.png'], kind: 'plastic' },
      { id: 'tray', img: ['tore(2).png', 'tore (2).png'], kind: 'plastic' },
      { id: 'okashi-bag', img: ['okashi1.png', 'okashi.png'], kind: 'plastic' },
      { id: 'hanger', img: ['hannga.png'], kind: 'plastic' },
      { id: 'spray', img: ['supuree2.png'], kind: 'plastic' },
      { id: 'egg', img: ['tamago2.png'], kind: 'plastic' },
    ];

    const RECYCLE_PRODUCTS = ['che.png', 'che3.png', 'ekobakku.png', 'syatu.png'];
    const recycleOkProducts = new Set();
    const recycleNgProducts = new Set();

    const playArea = document.getElementById('playArea');
    const itemEl = document.getElementById('item');
    const itemIcon = document.getElementById('itemIcon');
    const itemImg = document.getElementById('itemImg');
    const scoreEl = document.getElementById('score');
    const scorePill = document.querySelector('.scorePill');
    const resetBtn = document.getElementById('resetBtn');

    const feedback = document.getElementById('feedback');
    const fbIcon = document.getElementById('fbIcon');
    const fbItem = document.getElementById('fbItem');
    const recycleBeforeImg = document.getElementById('recycleBeforeImg');
    const recycleImg = document.getElementById('recycleImg');
    const recycleBadge = document.getElementById('recycleBadge');
    const recycleLine1 = document.getElementById('recycleLine1');
    const recycleLine2 = document.getElementById('recycleLine2');
    const confetti = document.getElementById('confetti');

    const stageToast = document.getElementById('stageToast');

    const startOverlay = document.getElementById('startOverlay');
    const playBtn = document.getElementById('playBtn');
    const startStageNum = document.getElementById('startStageNum');
    const startTitle = startOverlay ? startOverlay.querySelector('.startTitle') : null;
    const startHint = startOverlay ? startOverlay.querySelector('.startHint') : null;

    const binEls = [...document.querySelectorAll('.bin')];

    const BIN_IMG_FALLBACK_BASES = [
      '',
      'file:///C:/Users/Shikio/Desktop/gomi/',
    ];

    const ITEM_IMG_FALLBACK_BASES = [
      '',
      'gomi/',
      'file:///C:/Users/Shikio/Desktop/gomi/',
    ];

    let deck = [];
    let current = null;
    let score = 0;
    let stageScore = 0;
    let index = 0;
    let gameOver = false;
    let started = false;
    let throws = 0;
    let fbTimer = null;
    let nextTimer = null;
    const disabledItemIds = new Set();

    const THROWS_PER_STAGE = 10;
    const MAX_STAGE = 3;
    const NORMAL_FEEDBACK_MS = 700;
    const NG_FEEDBACK_MS = 700;
    const RECYCLE_FEEDBACK_MS = 1400;

    let stage = 1;
    let stageToastTimer = null;
    let stageAutoAdvanceTimer = null;

    function getStageItems(stageNum){
      return ITEMS.slice();
    }

    function setupBinImages(){
      const scheduleReset = () => {
        if (!started) return;
        if (itemEl.style.display === 'none') return;
        requestAnimationFrame(() => requestAnimationFrame(resetPosition));
      };

      for (const bin of binEls) {
        const img = bin.querySelector('.binImg');
        if (!img) continue;

        const primary = img.getAttribute('data-src') || '';
        const fallback = img.getAttribute('data-src-fallback') || '';
        const rels = [primary, fallback].filter(Boolean);

        let baseIndex = 0;
        let relIndex = 0;

        const tryLoad = () => {
          if (rels.length === 0) return;
          const base = BIN_IMG_FALLBACK_BASES[Math.min(baseIndex, BIN_IMG_FALLBACK_BASES.length - 1)];
          const rel = rels[Math.min(relIndex, rels.length - 1)];
          const url = base ? (base + rel.replace(/^gomi\//, '')) : rel;
          img.src = url;
        };

        img.addEventListener('load', () => {
          bin.classList.add('hasImg');
          scheduleReset();
        });

        img.addEventListener('error', () => {
          relIndex++;
          if (relIndex < rels.length) {
            tryLoad();
            return;
          }
          relIndex = 0;
          baseIndex++;
          if (baseIndex < BIN_IMG_FALLBACK_BASES.length) {
            tryLoad();
            return;
          }
          img.style.display = 'none';
          scheduleReset();
        });

        tryLoad();
      }

      setTimeout(scheduleReset, 0);
    }

    function showStart(){
      started = false;
      startOverlay.classList.remove('hidden');
      startOverlay.setAttribute('aria-hidden', 'false');
      itemEl.style.display = 'none';
      feedback.classList.remove('winMode');
      feedback.classList.remove('show');
      clearTimeout(fbTimer);
      clearTimeout(nextTimer);
      clearTimeout(stageAutoAdvanceTimer);
      stageAutoAdvanceTimer = null;

      if (startStageNum) startStageNum.textContent = String(stage);
      if (startTitle) startTitle.textContent = 'STAGE';
      if (startHint) startHint.textContent = '';
    }

    function hideStart(){
      startOverlay.classList.add('hidden');
      startOverlay.setAttribute('aria-hidden', 'true');
      started = true;
      requestAnimationFrame(() => requestAnimationFrame(resetPosition));
    }

    const drag = {
      active: false,
      pointerId: null,
      offsetX: 0,
      offsetY: 0,
    };

    function shuffle(arr){
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getTrashBinGap(){
      const v = getComputedStyle(document.documentElement).getPropertyValue('--trashBinGap').trim();
      const n = parseFloat(v);
      const base = Number.isFinite(n) ? n : 140;
      return Math.max(40, base) + 180;
    }

    function getBinLidTopInPlayArea(pr){
      const bins = [...document.querySelectorAll('.bin')];
      if (bins.length === 0) return null;
      const lidOffset = 14;
      let top = Infinity;
      for (const b of bins) {
        const r = b.getBoundingClientRect();
        top = Math.min(top, (r.top - pr.top) + lidOffset);
        const img = b.querySelector('.binImg');
        if (img) {
          const ir = img.getBoundingClientRect();
          top = Math.min(top, (ir.top - pr.top));
        }
      }
      return Number.isFinite(top) ? top : null;
    }

    function getItemMaxTop(pr, itemHeight){
      const gap = getTrashBinGap();
      const lidTop = getBinLidTopInPlayArea(pr);
      const binsEl = document.getElementById('bins');
      const binsTop = binsEl ? (binsEl.getBoundingClientRect().top - pr.top) : null;
      const hardTop = (binsTop == null) ? null : (binsTop - 80 - itemHeight);

      if (lidTop == null) {
        const fallback = pr.height - itemHeight;
        return hardTop == null ? fallback : Math.min(fallback, hardTop);
      }

      const byLid = lidTop - gap - itemHeight;
      return hardTop == null ? byLid : Math.min(byLid, hardTop);
    }

    function resetPosition(){
      const r = playArea.getBoundingClientRect();
      const w = itemEl.offsetWidth;
      const h = itemEl.offsetHeight;
      const left = (r.width - w) / 2;
      const maxTop = getItemMaxTop(r, h);
      const desiredTop = (r.height - h) * 0.12 - 340;
      const top = Math.max(0, Math.min(desiredTop, maxTop));
      itemEl.style.left = left + 'px';
      itemEl.style.top = top + 'px';
      itemEl.style.transform = 'translate(0,0)';
    }

    function setItem(item){
      current = item;
      itemEl.classList.toggle('okashiNoBg', item.id === 'okashi-bag');
      itemEl.classList.toggle('spraySmall', item.id === 'spray');
      itemEl.classList.toggle('boxUp', item.id === 'box');
      itemEl.classList.toggle('vinylBagUp', item.id === 'vinyl-bag');
      itemEl.classList.toggle('batteryUp', item.id === 'battery');
      itemEl.classList.toggle('applianceUp', item.id === 'appliance');
      itemEl.classList.toggle('okashiUp', item.id === 'okashi-bag');
      itemEl.classList.toggle('eggUp', item.id === 'egg');
      itemEl.classList.toggle('appleUp', item.id === 'apple');
      itemEl.classList.toggle('trayUp', item.id === 'tray');
      itemEl.classList.toggle('tissueUp', item.id === 'tissue');
      itemEl.classList.toggle('cupUpHalf', item.id === 'glass');
      itemIcon.textContent = '';
      setItemImage(item);
      resetPosition();
    }

    function disableCurrentAndSkip(){
      if (current?.id) disabledItemIds.add(current.id);
      itemEl.style.display = 'none';
      clearTimeout(nextTimer);
      nextTimer = setTimeout(() => {
        if (!started) return;
        if (gameOver) return;
        next();
      }, 0);
    }

    function toUrl(base, filename){
      if (!base) return filename;
      if (base.startsWith('file://')) return base + encodeURIComponent(filename);
      return base + filename;
    }

    function setItemImage(item){
      const candidates = Array.isArray(item.img) ? item.img : [];
      let baseIndex = 0;
      let nameIndex = 0;

      const tryNext = () => {
        if (candidates.length === 0) {
          disableCurrentAndSkip();
          return;
        }
        if (baseIndex >= ITEM_IMG_FALLBACK_BASES.length) {
          disableCurrentAndSkip();
          return;
        }

        const base = ITEM_IMG_FALLBACK_BASES[Math.min(baseIndex, ITEM_IMG_FALLBACK_BASES.length - 1)];
        const name = candidates[Math.min(nameIndex, candidates.length - 1)];
        itemImg.src = toUrl(base, name);
      };

      itemImg.onload = () => {
        itemImg.style.display = '';
        itemIcon.style.display = 'none';
        itemEl.style.display = '';
      };

      itemImg.onerror = () => {
        nameIndex++;
        if (nameIndex >= candidates.length) {
          nameIndex = 0;
          baseIndex++;
        }
        tryNext();
      };

      itemImg.style.display = '';
      tryNext();
    }

    function setRecycleImage(){
      const okList = [...recycleOkProducts];
      const allCandidates = okList.length > 0
        ? okList
        : RECYCLE_PRODUCTS.filter(n => !recycleNgProducts.has(n));

      if (allCandidates.length === 0) {
        recycleImg.style.display = 'none';
        return;
      }

      const name = allCandidates[Math.floor(Math.random() * allCandidates.length)];
      let baseIndex = 0;
      let triedFallbackFromOk = false;

      recycleImg.style.display = 'block';

      if (recycleBadge) {
        recycleBadge.classList.toggle('afterEkobakku', String(name).toLowerCase().includes('ekobakku'));
        recycleBadge.classList.toggle('afterSyatu', String(name).toLowerCase().includes('syatu'));
      }

      const tryNext = () => {
        if (baseIndex >= ITEM_IMG_FALLBACK_BASES.length) {
          recycleNgProducts.add(name);

          if (!triedFallbackFromOk && recycleOkProducts.size > 0 && !recycleOkProducts.has(name)) {
            triedFallbackFromOk = true;
            const safeList = [...recycleOkProducts];
            const safeName = safeList[Math.floor(Math.random() * safeList.length)];
            baseIndex = 0;
            if (recycleBadge) {
              recycleBadge.classList.toggle('afterEkobakku', String(safeName).toLowerCase().includes('ekobakku'));
              recycleBadge.classList.toggle('afterSyatu', String(safeName).toLowerCase().includes('syatu'));
            }
            recycleImg.src = toUrl(ITEM_IMG_FALLBACK_BASES[baseIndex], safeName);
            return;
          }

          setTimeout(() => setRecycleImage(), 0);
          return;
        }
        recycleImg.src = toUrl(ITEM_IMG_FALLBACK_BASES[baseIndex], name);
      };

      recycleImg.onload = () => {
        recycleImg.style.display = 'block';
        recycleOkProducts.add(name);
      };

      recycleImg.onerror = () => {
        baseIndex++;
        tryNext();
      };

      tryNext();
    }

    function updateHud(){
      scoreEl.textContent = String(score);
    }

    let audioCtx = null;
    function getAudio(){
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
      return audioCtx;
    }

    function beep({freq=440, dur=0.12, type='sine', gain=0.08} = {}){
      const ctx = getAudio();
      const t0 = ctx.currentTime;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(g);
      g.connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.02);
    }

    function soundOk(){
      beep({freq: 3300, dur: 0.012, type:'square', gain: 0.04});
      setTimeout(() => beep({freq: 2600, dur: 0.09, type:'triangle', gain: 0.06}), 10);
      setTimeout(() => beep({freq: 2100, dur: 0.07, type:'triangle', gain: 0.045}), 55);
    }

    function soundNg(){
      beep({freq:196, dur:0.16, type:'sawtooth', gain:0.06});
      setTimeout(() => beep({freq:155, dur:0.18, type:'sawtooth', gain:0.06}), 120);
    }

    function soundClap(){
      const ctx = getAudio();
      const t0 = ctx.currentTime;

      const makeNoise = (time) => {
        const dur = 0.14;
        const len = Math.floor(ctx.sampleRate * dur);
        const buf = ctx.createBuffer(1, len, ctx.sampleRate);
        const data = buf.getChannelData(0);

        for (let i = 0; i < len; i++) {
          data[i] = (Math.random() * 2 - 1);
        }

        const src = ctx.createBufferSource();
        src.buffer = buf;

        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.setValueAtTime(1400, time);
        bp.Q.setValueAtTime(0.9, time);

        const g = ctx.createGain();
        g.gain.setValueAtTime(0.0001, time);
        g.gain.exponentialRampToValueAtTime(0.28, time + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, time + dur);

        src.connect(bp);
        bp.connect(g);
        g.connect(ctx.destination);
        src.start(time);
        src.stop(time + dur);
      };

      makeNoise(t0 + 0.00);
      makeNoise(t0 + 0.10);
      makeNoise(t0 + 0.20);
      makeNoise(t0 + 0.32);
    }

    function burstConfetti(){
      confetti.innerHTML = '';
      const colors = ['#ff4d6d', '#22d3a7', '#5b6cff', '#ffe77a', '#7afcff', '#ff7ad1'];
      const area = playArea.getBoundingClientRect();

      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'piece';
        p.style.left = `${Math.random() * area.width}px`;
        p.style.top = `${Math.random() * 30}px`;
        p.style.background = colors[i % colors.length];
        p.style.animationDelay = `${Math.random() * 90}ms`;
        confetti.appendChild(p);
      }
    }

    function showFeedback(ok, showRecycle){
      feedback.classList.add('show');
      feedback.classList.remove('winMode');
      feedback.classList.toggle('recycleMode', !!showRecycle);

      fbIcon.classList.toggle('ok', ok);
      fbIcon.classList.toggle('ng', !ok);
      fbIcon.textContent = ok ? '😄' : '😢';

      fbIcon.style.display = showRecycle ? 'none' : '';

      fbItem.textContent = '';
      fbItem.classList.remove('finalScore');
      fbItem.style.display = 'none';

      recycleImg.style.display = 'none';
      if (recycleBadge) {
        recycleBadge.style.display = 'none';
        recycleBadge.setAttribute('aria-hidden', 'true');
      }
      recycleImg.classList.remove('big');

      if (showRecycle) {
        itemEl.style.display = 'none';
        if (recycleBadge) {
          recycleBadge.style.display = 'grid';
          recycleBadge.setAttribute('aria-hidden', 'false');
          recycleBadge.classList.remove('pop');
          void recycleBadge.offsetWidth;
          recycleBadge.classList.add('pop');
        }
        if (recycleBeforeImg) {
          if (recycleBadge) {
            recycleBadge.classList.toggle('beforeVinylBag', current?.id === 'vinyl-bag');
            recycleBadge.classList.toggle('beforeEgg', current?.id === 'egg');
            recycleBadge.classList.toggle('beforeSpray', current?.id === 'spray');
          }
          recycleBeforeImg.style.display = 'block';
          recycleBeforeImg.src = itemImg.src;
        }
        setRecycleImage();
      }

      if (ok) burstConfetti();

      clearTimeout(fbTimer);
      const duration = showRecycle ? RECYCLE_FEEDBACK_MS : (ok ? NORMAL_FEEDBACK_MS : NG_FEEDBACK_MS);
      fbTimer = setTimeout(() => {
        feedback.classList.remove('show');
      }, duration);
    }

    function showWin(){
      feedback.classList.add('show');
      feedback.classList.add('winMode');
      feedback.classList.remove('recycleMode');
      feedback.classList.remove('perfectWin');

      clearTimeout(stageAutoAdvanceTimer);
      stageAutoAdvanceTimer = null;

      recycleImg.style.display = 'none';
      if (recycleBadge) {
        recycleBadge.style.display = 'none';
        recycleBadge.setAttribute('aria-hidden', 'true');
      }

      const isFinalStage = (stage >= MAX_STAGE);
      const showScore = isFinalStage ? score : stageScore;
      const stagePerfect = (!isFinalStage && stageScore === THROWS_PER_STAGE);
      fbIcon.classList.add('ok');
      fbIcon.classList.remove('ng');
      fbIcon.style.display = stagePerfect ? 'none' : '';
      fbIcon.textContent = '🏆';

      fbItem.classList.add('finalScore');
      fbItem.classList.remove('perfect');
      fbItem.classList.toggle('stagePerfectScore', stagePerfect);
      if (isFinalStage && score === (THROWS_PER_STAGE * MAX_STAGE)) {
        feedback.classList.add('perfectWin');
        fbItem.classList.add('perfect');
        fbItem.innerHTML = `<span class="scoreEmojis left">🎉 🎊</span><span class="scoreMain">${showScore}</span><span class="scoreEmojis">✨ 🥳</span>`;
      } else if (!isFinalStage && stageScore === THROWS_PER_STAGE) {
        fbItem.innerHTML = `<div class="perfectRow"><span class="perfectStar">⭐</span><span class="scoreMain"><span class="trophyInScore">🏆</span>${showScore}</span><span class="perfectStar">⭐</span></div>`;
        soundClap();
        setTimeout(() => burstConfetti(), 120);
      } else {
        fbItem.innerHTML = `<span class="scoreMain">${showScore}</span>`;
      }
      fbItem.style.display = '';

      recycleImg.classList.remove('big');

      burstConfetti();

      clearTimeout(fbTimer);
      fbTimer = null;

      if (stage < MAX_STAGE) {
        const stageAtWin = stage;
        stageAutoAdvanceTimer = setTimeout(() => {
          if (!gameOver) return;
          if (stage !== stageAtWin) return;
          advanceStage();
        }, 5000);
      }
    }

    function clearHighlights(){
      for (const b of binEls) b.classList.remove('highlight');
    }

    function rectIntersectionArea(a, b){
      const left = Math.max(a.left, b.left);
      const right = Math.min(a.right, b.right);
      const top = Math.max(a.top, b.top);
      const bottom = Math.min(a.bottom, b.bottom);
      const w = right - left;
      const h = bottom - top;
      if (w <= 0 || h <= 0) return 0;
      return w * h;
    }

    function getBestOverlappedBin(){
      const itemRect = itemEl.getBoundingClientRect();
      const itemArea = Math.max(1, itemRect.width * itemRect.height);
      const cx = itemRect.left + itemRect.width / 2;
      const cy = itemRect.top + itemRect.height / 2;

      let best = null;
      let bestScore = 0;

      for (const b of binEls) {
        const img = b.querySelector('.binImg');
        const br = img ? img.getBoundingClientRect() : b.getBoundingClientRect();
        const area = rectIntersectionArea(itemRect, br);
        if (area <= 0) continue;

        const ratio = area / itemArea;
        const margin = 28;
        const centerInside = (cx >= (br.left - margin) && cx <= (br.right + margin) && cy >= (br.top - margin) && cy <= (br.bottom + margin));
        const score = ratio + (centerInside ? 0.25 : 0);

        if (score > bestScore) {
          bestScore = score;
          best = b;
        }
      }

      if (!best) return null;

      const bestImg = best.querySelector('.binImg');
      const br = bestImg ? bestImg.getBoundingClientRect() : best.getBoundingClientRect();
      const area = rectIntersectionArea(itemRect, br);
      const ratio = area / itemArea;
      const margin = 28;
      const centerInside = (cx >= (br.left - margin) && cx <= (br.right + margin) && cy >= (br.top - margin) && cy <= (br.bottom + margin));

      if (ratio < 0.14 && !centerInside) return null;
      if (ratio < 0.12) return null;

      return best;
    }

    function getBinFromPoint(x, y){
      const el = document.elementFromPoint(x, y);
      return el ? el.closest?.('.bin') : null;
    }

    function getBinFromPointIgnoringItem(x, y){
      const prev = itemEl.style.pointerEvents;
      itemEl.style.pointerEvents = 'none';
      const hit = getBinFromPoint(x, y);
      itemEl.style.pointerEvents = prev;
      return hit;
    }

    function highlightAt(){
      const hit = getBestOverlappedBin();
      for (const b of binEls) b.classList.toggle('highlight', b === hit);
    }

    function next(){
      let tries = 0;
      while (tries < Math.max(ITEMS.length, 1)) {
        index++;
        if (index >= deck.length) {
          deck = shuffle(getStageItems(stage).slice());
          index = 0;
        }
        const cand = deck[index];
        if (!cand) {
          tries++;
          continue;
        }
        if (disabledItemIds.has(cand.id)) {
          tries++;
          continue;
        }
        setItem(cand);
        return;
      }

      gameOver = true;
      itemEl.style.display = 'none';
    }

    function start(){
      clearTimeout(fbTimer);
      clearTimeout(nextTimer);
      deck = shuffle(getStageItems(stage).slice().filter(it => !disabledItemIds.has(it.id)));
      index = 0;
      stageScore = 0;
      throws = 0;
      gameOver = false;
      itemEl.style.display = '';
      updateHud();
      showStageToast();
      if (!deck[0]) {
        gameOver = true;
        itemEl.style.display = 'none';
        return;
      }
      setItem(deck[0]);
      feedback.classList.remove('show');
    }

    function showStageToast(){
      if (!stageToast) return;
      stageToast.textContent = `STAGE ${stage}`;
      stageToast.classList.add('show');
      stageToast.setAttribute('aria-hidden', 'false');
      clearTimeout(stageToastTimer);
      stageToastTimer = setTimeout(() => {
        stageToast.classList.remove('show');
        stageToast.setAttribute('aria-hidden', 'true');
      }, 900);
    }

    function startGame(){
      hideStart();
      start();
    }

    function advanceStage(){
      if (stage >= MAX_STAGE) {
        showStart();
        return;
      }
      stage += 1;
      feedback.classList.remove('show');
      feedback.classList.remove('winMode');
      gameOver = false;
      showStart();
    }

    function judge(kind){
      const ok = (kind === current.kind);
      const showRecycle = ok && current.kind === 'plastic';

      throws += 1;

      if (ok) {
        score += 1;
        stageScore += 1;
        soundOk();
      } else {
        soundNg();
      }

      updateHud();

      if (throws >= THROWS_PER_STAGE) {
        gameOver = true;
        itemEl.style.display = 'none';
        soundClap();
        showWin();
        return;
      }

      showFeedback(ok, showRecycle);

      clearTimeout(nextTimer);
      const waitMs = showRecycle ? RECYCLE_FEEDBACK_MS : (ok ? NORMAL_FEEDBACK_MS : NG_FEEDBACK_MS);
      nextTimer = setTimeout(() => next(), waitMs);
    }

    function onPointerDown(e){
      try { getAudio(); } catch {}
      if (!started) return;
      if (gameOver) return;

      drag.active = true;
      drag.pointerId = e.pointerId;
      itemEl.setPointerCapture(e.pointerId);

      const r = itemEl.getBoundingClientRect();
      drag.offsetX = e.clientX - r.left;
      drag.offsetY = e.clientY - r.top;
    }

    function onPointerMove(e){
      if (!drag.active || e.pointerId !== drag.pointerId) return;

      const pr = playArea.getBoundingClientRect();
      const newLeft = (e.clientX - pr.left) - drag.offsetX;
      const newTop = (e.clientY - pr.top) - drag.offsetY;

      const maxLeft = pr.width - itemEl.offsetWidth;
      const maxTop = getItemMaxTop(pr, itemEl.offsetHeight);

      itemEl.style.left = Math.max(0, Math.min(maxLeft, newLeft)) + 'px';
      itemEl.style.top = Math.max(0, Math.min(maxTop, newTop)) + 'px';

      highlightAt();
    }

    function onPointerUp(e){
      if (!drag.active || e.pointerId !== drag.pointerId) return;

      drag.active = false;
      const drop = getBestOverlappedBin();
      clearHighlights();

      if (!drop) {
        resetPosition();
        return;
      }

      judge(drop.getAttribute('data-bin'));
    }

    function onPointerCancel(e){
      if (e.pointerId !== drag.pointerId) return;
      drag.active = false;
      clearHighlights();
      resetPosition();
    }

    itemEl.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove, { passive:false });
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('pointercancel', onPointerCancel);

    resetBtn.addEventListener('click', () => {
      soundOk();
      stage = 1;
      score = 0;
      if (!started) startGame();
      else start();
    });

    scorePill.addEventListener('click', () => {
      soundOk();
      drag.active = false;
      clearHighlights();
      if (started && gameOver) {
        advanceStage();
        return;
      }
      gameOver = true;
      showStart();
    });

    window.addEventListener('resize', resetPosition);

    playBtn.addEventListener('click', () => {
      soundOk();
      startGame();
    });

    playBtn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        soundOk();
        startGame();
      }
    });

    setupBinImages();
    showStart();
  })();
  </script>
</body>
</html>
